{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-4">

        <div class="card shadow p-4">

            <h3 class="text-center mb-3">

                Reset Password

            </h3>

            <form method="POST">

                <input
                    type="password"
                    name="password"
                    class="form-control mb-3"
                    placeholder="New Password"
                    required
                >

                <button class="btn btn-warning w-100">

                    Update Password

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
