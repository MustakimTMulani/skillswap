{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow border-0 p-4">

            <h3 class="mb-4">
                Rate Your Skill Exchange
            </h3>

            <form method="POST">

                <label class="mb-2">
                    Rating (1–5)
                </label>

                <input
                    type="number"
                    name="rating"
                    min="1"
                    max="5"
                    class="form-control mb-3"
                    required
                >

                <label class="mb-2">
                    Feedback
                </label>

                <textarea
                    name="feedback"
                    class="form-control mb-4"
                    rows="4"
                    placeholder="Write your feedback..."
                    required
                ></textarea>

                <button class="btn btn-dark w-100">
                    Submit Feedback
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
