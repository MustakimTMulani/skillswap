{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-4">

        <div class="card shadow p-4">

            <h3 class="text-center mb-3">

                Forgot Password

            </h3>

            <form method="POST">

                <input
                    type="email"
                    name="email"
                    class="form-control mb-3"
                    placeholder="Enter Email"
                    required
                >

                <button class="btn btn-dark w-100">

                    Send OTP

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
